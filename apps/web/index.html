<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kittie — App Intelligence</title>
    <meta name="robots" content="index, follow" />
    <meta
      name="description"
      content="App intelligence for AI agents: modelled revenue & download estimates, per-country chart rankings with first-mover trend detection, ASO keyword difficulty, and review sentiment — as a machine-readable API and MCP server."
    />
    <!-- Agent-readable identity. Machine capabilities: /llms.txt · API: /api/v1/openapi.json -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Kittie — App Intelligence",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web, API, MCP",
        "description": "Mobile app intelligence for AI agents: modelled revenue & download estimates, per-country App Store / Google Play chart rankings with day-over-day movement and first-mover trend detection, ASO keyword difficulty across markets, and review sentiment. Exposed as a machine-readable JSON API and a Model Context Protocol server.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD",
          "description": "Free tier for agent discovery and evaluation."
        },
        "potentialAction": {
          "@type": "SearchAction",
          "target": "/api/v1/apps?search={query}",
          "query-input": "required name=query"
        }
      }
    </script>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23adfa1b'/%3E%3Cpath d='M16 6l2.6 5.3 5.9.9-4.2 4.1 1 5.8L16 25.4l-5.3 2.7 1-5.8-4.2-4.1 5.9-.9z' fill='%2314180a'/%3E%3C/svg%3E" />
    <!-- App-icon CDNs — warm the connection before the first table renders -->
    <link rel="preconnect" href="https://is1-ssl.mzstatic.com" />
    <link rel="preconnect" href="https://play-lh.googleusercontent.com" />
    <!-- Geist Sans + Geist Mono (Cult UI app chrome) · display fonts (screenshot generator) · Space Grotesk + JetBrains Mono (Reviews) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Anton&family=Archivo:wght@500;700;800&family=Archivo+Black&family=DM+Sans:wght@400;500;700;800&family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500;600;700&family=Playfair+Display:wght@500;700;800&family=Poppins:wght@500;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
