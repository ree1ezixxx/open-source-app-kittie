name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck and build
        run: |
          pnpm --filter @kittie/types build
          pnpm --filter @kittie/core build
          pnpm --filter @kittie/intelligence build
          pnpm typecheck
          pnpm build

      - name: Test (all packages)
        # Full recursive suite. Do NOT narrow this filter — #214 silently scoped it
        # to @kittie/cli and every PR after went green on 41/403 tests (audit finding).
        run: pnpm -r test

      - name: Packaged MCP startup (#267)
        # Proves the DOCUMENTED invocation — plain `node apps/mcp/dist/index.js`,
        # no tsx — answers tools/list. Exports-to-src regressions are invisible
        # to vitest; only this catches them.
        run: node scripts/check-mcp-packaged.mjs
