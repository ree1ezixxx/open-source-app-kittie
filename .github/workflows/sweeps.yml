name: data-sweeps

# Data substrate sweep. The scheduled trigger is DISABLED (2026-07-02): the
# hosted Turso DB endpoint 404s (dead/deleted free-tier DB) so every scheduled
# run failed — see #205. Data infra is deferred to a scoped decision (likely
# Neon/Postgres). Re-enable the `schedule` block once a live DB + secrets exist.
# workflow_dispatch is kept so the sweep can still be run manually for testing.
on:
  # schedule:
  #   - cron: "23 */6 * * *" # DISABLED — dead Turso DB (#205); re-enable with a live DB
  workflow_dispatch: {}

concurrency:
  group: data-sweeps
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build all workspace packages so the tsx sweep script can resolve the
      # compiled @kittie/* entrypoints (dist/index.js). run-sweeps-once.ts runs
      # from source but transitively imports @kittie/{types,core,intelligence,
      # db,ingest,clone-engine}; without their dist it fails ERR_MODULE_NOT_FOUND
      # (seen on @kittie/types/dist/index.js). `pnpm build` = `pnpm -r build`,
      # topologically ordered, so every package's dist exists before the sweep.
      - name: Build workspace packages
        run: pnpm build

      - name: Run due sweeps
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: pnpm --filter @kittie/api exec tsx src/scripts/run-sweeps-once.ts
